<!DOCTYPE html>
<html lang="ru">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>FitCore | Register</title>
  <link rel="stylesheet" href="css/style.css" />
</head>
<body>
  <header class="header">
    <div class="container navbar">
      <a href="index.html" class="logo">FitCore</a>

      <nav class="nav">
        <a href="index.html">Главная</a>
        <a href="programs.html">Программы</a>
        <a href="trainers.html">Тренеры</a>
        <a href="schedule.html">Расписание</a>
        <a href="pricing.html">Тарифы</a>
      </nav>

      <div class="nav-buttons">
        <a href="login.html" class="btn btn-outline">Login</a>
        <a href="register.html" class="btn btn-primary">Register</a>
      </div>
    </div>
  </header>

  <main>
    <section class="auth-section">
      <div class="container">
        <div class="auth-box">
          <p class="section-label">Регистрация</p>
          <h1>Создай аккаунт в FitCore</h1>
          <p class="auth-text">Заполни форму ниже и начни путь к своей лучшей физической форме.</p>

          <form class="auth-form">
            <input type="text" placeholder="Имя" required />
            <input type="email" placeholder="Email" required />
            <input type="password" placeholder="Пароль" required />
            <input type="password" placeholder="Подтвердите пароль" required />
            <button type="submit" class="btn btn-primary">Зарегистрироваться</button>
          </form>

          <p class="auth-link">
            Уже есть аккаунт? <a href="login.html">Войти</a>
          </p>
        </div>
      </div>
    </section>
  </main>

  <footer class="footer">
    <div class="footer-bottom">
      <p>© 2026 FitCore. Все права защищены.</p>
    </div>
  </footer>
</body>
</html>
